version: '3.8'

services:
  devportal-server:
    build: .
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - PORT=3001
      - WS_PORT=3002
      - DOMAIN=${DOMAIN:-devportal.live}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy for SSL termination
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - devportal-server
    restart: unless-stopped
